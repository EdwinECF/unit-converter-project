<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="topContainer">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input type="number" id="input-num" placeholder="20">
            <button id="convert-btn">Convert</button>
        <div>
        <div class="botContainer">
            <h3>Length (Meter/Feet)</h3>
            <p id="plength">20 meters = 65.620 feet | 20 feet = 6.096 meters</p>
            <h3>Volume (Liters/Gallons)</h3>
            <p id="pvolume">20 liters = 5.280 gallons | 20 gallons = 75.758 liters</p>
            <h3>Mass (Kilograms/Pounds)</h3>
            <p id="pmass">20 kilos = 44.080 pounds | 20 pounds = 9.074 kilos</p>
        <div>
        <script src="index.js"></script>
    </body>
</html>
